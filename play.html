<!doctype html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Play</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle,#1a1f3a,#0b0f1a);
  color:white;
  text-align:center;
}

.wrap {
  max-width:420px;
  margin:auto;
  padding:20px;
}

.top {
  display:flex;
  justify-content:space-between;
  font-size:14px;
  opacity:0.8;
  margin-bottom:10px;
}

.live {
  color:#00ff66;
}

.title {
  font-size:32px;
  color:#ffcc00;
  margin-bottom:15px;
}

/* ВИДЕО ВМЕСТО ГИФ */
.video {
  width:100%;
  border-radius:16px;
  border:3px solid #ffcc00;
}

.feed {
  margin:15px 0;
  font-size:14px;
  height:24px;
}

.card {
  padding:20px;
  border-radius:16px;
  background:rgba(255,255,255,0.05);
}

.btn {
  margin-top:15px;
  display:block;
  padding:18px;
  background:linear-gradient(90deg,#ff1a1a,#ff0000);
  border-radius:14px;
  text-decoration:none;
  color:white;
  font-size:20px;
  font-weight:bold;
}

.progress {
  height:8px;
  background:#333;
  border-radius:10px;
  margin-top:10px;
  overflow:hidden;
}

.bar {
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#ff1a1a,#ffcc00);
}

.timer {
  margin-top:10px;
  color:#ff4d4d;
}
</style>
</head>

<body>

<div class="wrap">

  <div class="top">
    <div class="live">● <span id="online">412</span> playing now</div>
    <div>+<span id="wins">18</span> won last hour</div>
  </div>

  <div class="title">MINESLOT</div>

  <!-- ВИДЕО -->
  <video autoplay muted loop playsinline class="video">
    <source src="game.mp4" type="video/mp4">
  </video>

  <div class="feed" id="feed">
    ID: 583*** won $24
  </div>

  <div class="card">

    <div>Special bonus: $50</div>
    <div class="timer" id="time">05:00</div>

    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>

    <a href="https://lkaj.cc/e4de42" class="btn">
      PLAY NOW
    </a>

  </div>

</div>

<script>

// онлайн
setInterval(()=>{
  let el = document.getElementById("online");
  let val = parseInt(el.innerText);
  val += Math.floor(Math.random()*5 - 2);
  if(val < 300) val = 320;
  el.innerText = val;
},2000);

// выигрыши
setInterval(()=>{
  let el = document.getElementById("wins");
  let val = parseInt(el.innerText);
  val += Math.floor(Math.random()*3);
  el.innerText = val;
},3000);

// фид
setInterval(()=>{
  let id = Math.floor(Math.random()*900 + 100);
  let money = Math.floor(Math.random()*50 + 5);
  document.getElementById("feed").innerText =
    "ID: " + id + "*** won $" + money;
},1500);

// прогресс
let p = 0;
let bar = document.getElementById("bar");

setInterval(()=>{
  if(p < 100){
    p += 2;
    bar.style.width = p + "%";
  }
},200);

// таймер
let t = 300;
setInterval(()=>{
  if(t>0){
    t--;
    let m = Math.floor(t/60);
    let s = t%60;
    document.getElementById("time").innerText =
      m + ":" + (s<10?"0"+s:s);
  }
},1000);

// редирект
setTimeout(()=>{
  window.location.href = "https://lkaj.cc/e4de42";
},6000);

</script>

</body>
</html>
